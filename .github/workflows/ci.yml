name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check version sync
        run: |
          python - <<'EOF'
          import tomllib, shellsage
          with open("pyproject.toml", "rb") as f:
              toml_version = tomllib.load(f)["project"]["version"]
          pkg_version = shellsage.__version__
          assert pkg_version == toml_version, (
              f"Version mismatch: shellsage.__version__={pkg_version!r} "
              f"but pyproject.toml version={toml_version!r}"
          )
          print(f"Version check passed: {pkg_version}")
          EOF

      - name: Lint with ruff
        run: |
          if pip show ruff > /dev/null 2>&1; then
            ruff check shellsage/ tests/
          else
            echo "ruff not installed — skipping lint"
          fi

      - name: Run tests
        run: pytest tests/ -v
